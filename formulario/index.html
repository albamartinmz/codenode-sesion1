<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Contacto</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="container">
    <section class="form-section">

      <header class="form-header">
        <h1>Contáctanos</h1>
        <p>Rellena el formulario y te responderemos lo antes posible.</p>
      </header>

      <form action="index.php" method="POST" novalidate>

        <fieldset>
          <legend>Datos personales</legend>

          <div class="form-group">
            <label for="nombre">Nombre <span aria-hidden="true">*</span></label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Tu nombre"
              required
              autocomplete="given-name"
            />
            <span class="field-error" id="error-nombre">Solo se permiten letras y espacios.</span>
          </div>

          <div class="form-group">
            <label for="apellidos">Apellidos <span aria-hidden="true">*</span></label>
            <input
              type="text"
              id="apellidos"
              name="apellidos"
              placeholder="Tus apellidos"
              required
              autocomplete="family-name"
            />
            <span class="field-error" id="error-apellidos">Solo se permiten letras y espacios.</span>
          </div>

          <div class="form-group">
            <label for="email">Email <span aria-hidden="true">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tucorreo@ejemplo.com"
              required
              autocomplete="email"
            />
            <span class="field-error" id="error-email">Introduce un email válido.</span>
          </div>

          <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              placeholder="+34 600 000 000"
              autocomplete="tel"
            />
            <span class="field-error" id="error-telefono">Formato inválido (ej: +34 600 000 000).</span>
          </div>

        </fieldset>

        <fieldset>
          <legend>Tu mensaje</legend>

          <div class="form-group">
            <label for="mensaje">Mensaje <span aria-hidden="true">*</span></label>
            <textarea
              id="mensaje"
              name="mensaje"
              rows="5"
              placeholder="Escribe tu mensaje aquí..."
              required
            ></textarea>
            <span class="field-error" id="error-mensaje">El mensaje no puede estar vacío.</span>
          </div>

        </fieldset>

        <p class="required-note"><span>*</span> Campos obligatorios</p>

        <button type="submit">Enviar mensaje</button>

      </form>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
